<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Navy background -->
  <rect width="100" height="100" rx="18" fill="#1C3A5C"/>

  <!-- Teal swaddle (behind head) -->
  <ellipse cx="50" cy="82" rx="26" ry="19" fill="#6CBFB8"/>
  <circle cx="40" cy="80" r="2.5" fill="white" opacity="0.35"/>
  <circle cx="52" cy="87" r="2.5" fill="white" opacity="0.35"/>
  <circle cx="63" cy="80" r="2.5" fill="white" opacity="0.35"/>
  <circle cx="44" cy="89" r="2" fill="white" opacity="0.25"/>
  <circle cx="57" cy="75" r="2" fill="white" opacity="0.25"/>

  <!-- Baby head -->
  <circle cx="50" cy="48" r="22" fill="#FAD3AF"/>

  <!-- Rosy cheeks -->
  <ellipse cx="34" cy="53" rx="5" ry="3.5" fill="#F4A5BE" opacity="0.45"/>
  <ellipse cx="66" cy="53" rx="5" ry="3.5" fill="#F4A5BE" opacity="0.45"/>

  <!-- Eyes -->
  <ellipse cx="42" cy="47" rx="3.2" ry="3.8" fill="#1C3A5C"/>
  <ellipse cx="58" cy="47" rx="3.2" ry="3.8" fill="#1C3A5C"/>
  <circle cx="43.5" cy="45.5" r="1.3" fill="white"/>
  <circle cx="59.5" cy="45.5" r="1.3" fill="white"/>

  <!-- Smile -->
  <path d="M 43 55 Q 50 62 57 55" stroke="#C4904A" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Hair tuft -->
  <path d="M 46 28 Q 50 24 54 28" stroke="#C4904A" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <!-- Pink heart -->
  <path d="M 50 20 C 49.5 18 47 18 47 20.5 C 47 23 50 25.5 50 25.5 C 50 25.5 53 23 53 20.5 C 53 18 50.5 18 50 20Z" fill="#F28FAB"/>
</svg>
